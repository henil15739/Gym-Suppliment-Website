<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>GAINZ | Secure Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --accent: #ffd166; --bg-dark: #050505; --admin-red: #ff4444; }
        body { background-color: var(--bg-dark); color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }

        #spotlight {
            position: fixed; inset: 0; z-index: 1; pointer-events: none;
            background: radial-gradient(circle 600px at var(--mouse-x, 50%) var(--mouse-y, 50%), rgba(255, 209, 102, 0.06), transparent 80%);
        }

        .auth-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.5s cubic-bezier(0.2, 1, 0.2, 1);
        }

        .input-field {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .input-field:focus {
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.08);
            outline: none;
            box-shadow: 0 0 15px rgba(255, 209, 102, 0.1);
        }

        .hidden-form { display: none; }
        .scramble-font { font-family: 'ui-monospace', monospace; }
        .mag-wrap { display: inline-block; transition: transform 0.2s ease-out; }
        
        .admin-trigger {
            border: 1px solid rgba(255, 68, 68, 0.2);
            color: var(--admin-red);
            transition: all 0.3s ease;
        }
        .admin-trigger:hover {
            background: rgba(255, 68, 68, 0.1);
            border-color: var(--admin-red);
            box-shadow: 0 0 15px rgba(255, 68, 68, 0.1);
        }
    </style>
</head>
<body class="antialiased flex items-center justify-center min-h-screen">
    <div id="spotlight"></div>

    <main class="relative z-10 w-full max-w-md px-6">
        <div class="flex flex-col items-center mb-10">
            <div class="flex items-center gap-3 mb-2">
                <div class="w-10 h-10 bg-amber-400 rounded-lg flex items-center justify-center text-black font-black text-2xl shadow-[0_0_20px_rgba(255,209,102,0.3)]">G</div>
                <span class="font-black text-3xl tracking-tighter uppercase">Gainz</span>
            </div>
            <span id="portal-sub" class="text-[10px] text-amber-400 font-bold tracking-[0.4em] uppercase">Member Portal</span>
        </div>

        <div id="login-container" class="auth-card p-8 rounded-3xl">
            <h2 id="login-title" class="text-2xl font-black mb-6 scramble-font" data-value="ACCESS GRANTED">INITIALIZING...</h2>
            
            <form id="loginForm" class="space-y-4">
                <div>
                    <label class="text-[10px] uppercase tracking-widest text-gray-500 font-bold mb-2 block">Identity ID / Email</label>
                    <input type="text" name="id" id="loginId" required class="input-field w-full px-4 py-3 rounded-xl text-white placeholder-gray-600" placeholder="Athlete ID">
                </div>
                <div>
                    <label class="text-[10px] uppercase tracking-widest text-gray-500 font-bold mb-2 block">Security Cipher</label>
                    <input type="password" name="password" id="loginPass" required class="input-field w-full px-4 py-3 rounded-xl text-white placeholder-gray-600" placeholder="••••••••">
                </div>
                
                <div class="flex gap-3 pt-2">
                    <div class="mag-wrap flex-grow">
                        <button type="submit" id="loginBtn" class="w-full bg-amber-400 text-black py-4 rounded-xl font-black uppercase text-xs tracking-tight hover:shadow-[0_0_30px_rgba(255,209,102,0.2)] transition-all">
                            Initialize
                        </button>
                    </div>
                    <button type="button" onclick="window.location.href='adminlogin.html'" class="admin-trigger px-4 rounded-xl text-[10px] font-black uppercase tracking-widest">
                        Admin
                    </button>
                </div>
            </form>

            <div class="mt-8 pt-6 border-t border-white/5">
                <p class="text-gray-500 text-[10px] uppercase tracking-[0.2em] text-center">
                    New to the program? 
                    <button onclick="toggleAuth()" class="text-amber-400 font-bold hover:underline ml-1">Create Account</button>
                </p>
            </div>
        </div>

        <div id="register-container" class="auth-card p-8 rounded-3xl hidden-form">
            <h2 class="text-2xl font-black mb-6 scramble-font" data-value="CREATE PROTOCOL">INITIALIZING...</h2>
            <form id="registerForm" class="space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <input type="text" name="first_name" placeholder="First Name" required class="input-field w-full px-4 py-3 rounded-xl text-white text-sm">
                    <input type="text" name="last_name" placeholder="Last Name" required class="input-field w-full px-4 py-3 rounded-xl text-white text-sm">
                </div>
                <input type="email" name="email" placeholder="Email Address" required class="input-field w-full px-4 py-3 rounded-xl text-white text-sm">
                <input type="password" name="password" placeholder="Password" required class="input-field w-full px-4 py-3 rounded-xl text-white text-sm">
                
                <div class="flex gap-3 pt-2">
                    <button type="submit" class="flex-grow border border-amber-400/50 text-amber-400 py-4 rounded-xl font-black uppercase text-xs tracking-tight hover:bg-amber-400 hover:text-black transition-all">
                        Register
                    </button>
                    <button type="button" onclick="window.location.href='adminlogin.html'" class="admin-trigger px-4 rounded-xl text-[10px] font-black uppercase tracking-widest">
                        Admin
                    </button>
                </div>
            </form>

            <div class="mt-8 pt-6 border-t border-white/5">
                <p class="text-gray-500 text-[10px] uppercase tracking-[0.2em] text-center">
                    Already enrolled? 
                    <button onclick="toggleAuth()" class="text-amber-400 font-bold hover:underline ml-1">Login Here</button>
                </p>
            </div>
        </div>
    </main>

<script>
function runScramble(el) {
    if (!el) return;
    const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789#%&";
    const goal = el.dataset.value;
    let count = 0;
    const timer = setInterval(() => {
        el.innerText = goal.split("").map((letter, i) => {
            if(i < count) return goal[i];
            if(letter === " ") return " ";
            return chars[Math.floor(Math.random() * chars.length)];
        }).join("");
        if(count >= goal.length) clearInterval(timer);
        count += 1/3;
    }, 30);
}

function toggleAuth() {
    document.getElementById('login-container').classList.toggle('hidden-form');
    document.getElementById('register-container').classList.toggle('hidden-form');
    runScramble(document.querySelector('.auth-card:not(.hidden-form) h2'));
}

window.addEventListener('mousemove', (e) => {
    document.getElementById('spotlight').style.setProperty('--mouse-x', `${e.clientX}px`);
    document.getElementById('spotlight').style.setProperty('--mouse-y', `${e.clientY}px`);

    document.querySelectorAll('.mag-wrap').forEach(m => {
        const r = m.getBoundingClientRect();
        const mX = r.left + r.width / 2;
        const mY = r.top + r.height / 2;
        const dist = Math.hypot(e.clientX - mX, e.clientY - mY);
        m.style.transform = dist < 100 ? `translate(${(e.clientX - mX) * 0.1}px, ${(e.clientY - mY) * 0.1}px)` : `translate(0,0)`;
    });
});

document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('loginBtn');
    btn.innerText = "WAIT...";
    
    try {
        const response = await fetch('http://127.0.0.1:5000/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ 
                email: document.getElementById('loginId').value, 
                password: document.getElementById('loginPass').value 
            })
        });
        const result = await response.json();
        if (result.status === "success") {
            window.location.href = "home.html";
        } else {
            alert(result.message);
            btn.innerText = "Initialize";
        }
    } catch (err) {
        alert("API Offline");
        btn.innerText = "Initialize";
    }
});

document.addEventListener('DOMContentLoaded', () => {
    runScramble(document.querySelector('#login-container h2'));
});
</script>
</body>
</html>
